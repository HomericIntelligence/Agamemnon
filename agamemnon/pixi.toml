[workspace]
name = "agamemnon-orchestration"
version = "0.1.0"
description = "Python orchestration layer for ProjectAgamemnon"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

[dependencies]
python = ">=3.11,<4"

[pypi-dependencies]
"HomericIntelligence-Agamemnon-Orchestration" = { path = ".", editable = true }
pydantic = ">=2.0,<3"
"nats-py" = ">=2.6,<3"
httpx = ">=0.27,<1"

[feature.test.pypi-dependencies]
pytest = ">=8.0,<9"
pytest-asyncio = ">=0.23,<1"
pytest-cov = ">=5.0,<6"
mypy = ">=1.10,<2"
ruff = ">=0.4,<1"

[feature.test.tasks]
test = "python -m pytest tests/ -v"
lint = "ruff check src/ tests/"
format = "ruff format src/ tests/"
typecheck = "mypy src/agamemnon/"

[environments]
default = { features = ["test"], solve-group = "default" }
