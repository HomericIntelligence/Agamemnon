[workspace]
name = "agamemnon-client"
version = "0.1.0"
description = "Async Python client for the Agamemnon REST API"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.9,<4"

[pypi-dependencies]
"HomericIntelligence-Agamemnon" = { path = ".", editable = true }
httpx = ">=0.27,<1"
pydantic = ">=2.0,<3"
nats-py = ">=2.6,<3"

[feature.dev.pypi-dependencies]
# Canonical orchestration package, pulled in as a dev dependency so the
# client tests under tests/orchestration/ can exercise the real
# implementation rather than a vendored copy. See PR
# refactor/orchestration-single-source-2026-05-17 (audit finding S1).
"HomericIntelligence-Agamemnon-Orchestration" = { path = "../../agamemnon", editable = true }
pytest = ">=8.0,<9"
pytest-asyncio = ">=0.26,<1"
pytest-cov = ">=5.0,<6"
pytest-timeout = ">=2.3,<3"
respx = ">=0.21,<1"
mypy = ">=1.10,<2"
ruff = ">=0.4,<1"
pyyaml = ">=6.0,<7"

[feature.dev.tasks]
test = "python -m pytest tests/ -v --cov=agamemnon_client --cov-report=term-missing --cov-fail-under=96"
# Coverage for repo-root utility scripts (e.g. scripts/bump-version.py).
# Tracked separately from the client-library coverage gate (see #104) so
# script-level regressions cannot silently lower the client-library number.
coverage-scripts = "python -m pytest tests/test_bump_version.py -v --cov=../../scripts --cov-report=term-missing --cov-fail-under=95"
lint = "ruff check src/ tests/"
format = "ruff format src/ tests/"
typecheck = "mypy src/"

[feature.lint.pypi-dependencies]
pip-audit = ">=2.8"
pip = ">=26.1.2"
# Transitive dep of pip-audit (via cachecontrol). Pinned to the first patched
# release for GHSA-6v7p-g79w-8964 (use-after-free DoS, CVSS 7.5); msgpack
# <= 1.2.0 is flagged by security/dependency-scan and blocks all open PRs.
msgpack = ">=1.2.1"

[feature.lint.tasks]
audit = "pip-audit --skip-editable"

[environments]
default = { features = ["dev"], solve-group = "default" }
lint    = { features = ["lint"], solve-group = "default" }
