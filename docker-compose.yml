services:
  nats:
    image: nats:2-alpine
    command: ["-js"]
    ports:
      - "4222:4222"

  agamemnon:
    build: .
    depends_on:
      - nats
    ports:
      - "8080:8080"
    environment:
      NATS_URL: nats://nats:4222
      PORT: "8080"
      SERVER_THREAD_COUNT: "8"
      SERVER_READ_TIMEOUT_SEC: "10"
      SERVER_WRITE_TIMEOUT_SEC: "10"
      SERVER_REQUEST_SIZE_LIMIT_MB: "4"
      NATS_STREAM_MAX_BYTES_MB: "50"
      NATS_STREAM_MAX_AGE_SEC: "3600"
    mem_limit: 256m
    cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped
