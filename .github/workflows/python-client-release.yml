name: Python Client Release

# NOTE: This release workflow is pure Python today. If a future change adds C++
# extension build steps (conan install / cmake / FetchContent), add Conan +
# FetchContent caches matching the build-test job in `_required.yml` — see
# issue #242.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  build-and-publish-client:
    name: Build and publish client to PyPI
    runs-on: ubuntu-24.04
    environment: pypi
    timeout-minutes: 20
    defaults:
      run:
        working-directory: clients/python
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Verify pypi environment and OIDC permissions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fail fast if the pypi GitHub environment is missing or misconfigured
          if ! gh api "repos/${{ github.repository }}/environments/pypi" --silent 2>/dev/null; then
            echo "::error::GitHub environment 'pypi' does not exist or is inaccessible."
            echo "::error::Create the environment at: https://github.com/${{ github.repository }}/settings/environments"
            echo "::error::It must be named exactly 'pypi' and scoped to the 'v*' tag pattern."
            exit 1
          fi

          # Verify OIDC token endpoint is available (set by runner when id-token: write is granted)
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL}" ]; then
            echo "::error::OIDC token endpoint is not available."
            echo "::error::Ensure 'id-token: write' is present in the workflow permissions block."
            exit 1
          fi

          echo "Preflight passed: 'pypi' environment exists and OIDC is available."

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: clients/python/dist/
          verbose: true

  build-and-publish-orchestration:
    name: Build and publish orchestration to PyPI
    runs-on: ubuntu-24.04
    environment: pypi
    timeout-minutes: 20
    defaults:
      run:
        working-directory: agamemnon
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install Pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11  # v0.9.6
        with:
          pixi-version: "v0.32.1"

      - name: Build wheel and sdist
        run: pixi run -- hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: agamemnon/dist/
          verbose: true
