name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: ${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        compiler: [gcc, clang]
        build_type: [debug, release]
    steps:
      - uses: actions/checkout@v4

      - name: Restore Conan cache
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ matrix.build_type }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-${{ matrix.build_type }}-
            conan-${{ runner.os }}-

      - name: Restore FetchContent cache
        uses: actions/cache@v4
        with:
          path: build/**/_deps
          key: fetchcontent-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-
            fetchcontent-${{ runner.os }}-${{ matrix.compiler }}-
            fetchcontent-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            sudo apt-get install -y clang
          fi
          pip install conan
          conan profile detect --force

      - name: Install Conan dependencies
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          BUILD_TYPE_CAP="${BUILD_TYPE^}"
          conan install . --build=missing -s build_type="$BUILD_TYPE_CAP" \
            --output-folder "build/$BUILD_TYPE"

      - name: Configure (${{ matrix.compiler }}, ${{ matrix.build_type }})
        env:
          COMPILER: ${{ matrix.compiler }}
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          if [ "$COMPILER" = "clang" ]; then
            export CC=clang CXX=clang++
          fi
          cmake --preset "$BUILD_TYPE"

      - name: Build
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: cmake --build --preset "$BUILD_TYPE"

      - name: Test
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: ctest --preset "$BUILD_TYPE" --timeout 120 --parallel 4

  # AddressSanitizer job -- catches dangling-reference / use-after-free regressions
  # introduced by incorrect lambda captures in routes.cpp (see #220).
  asan:
    name: ubuntu-24.04-clang-asan
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Restore Conan cache
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-asan-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-asan-
            conan-${{ runner.os }}-

      - name: Restore FetchContent cache
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-${{ runner.os }}-clang-asan-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-clang-asan-
            fetchcontent-${{ runner.os }}-clang-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang
          pip install conan
          conan profile detect --force

      - name: Install Conan dependencies
        run: |
          conan install . --build=missing -s build_type=Debug \
            --output-folder build/asan

      - name: Configure (clang, asan)
        run: |
          export CC=clang CXX=clang++
          cmake --preset asan

      - name: Build
        run: cmake --build --preset asan

      - name: Test
        env:
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=1
        run: ctest --preset asan --timeout 120 --parallel 4

  python-orchestration:
    name: python-orchestration
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.67.2
          cache: true

      - name: Lint agamemnon/
        run: cd agamemnon && pixi run lint

      - name: Type check agamemnon/
        run: cd agamemnon && pixi run typecheck

      - name: Test agamemnon/
        run: cd agamemnon && pixi run test

  docker-build:
    name: docker-build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: DOCKER_BUILDKIT=1 docker build --progress=plain -t agamemnon:ci-test .

      - name: Verify image exists
        run: docker image inspect agamemnon:ci-test

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: agamemnon:ci-test
          format: table
          exit-code: "1"
          severity: CRITICAL

  cyclonedx-validate:
    name: cyclonedx-validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install check-jsonschema
        run: pip install check-jsonschema

      - name: Validate cpp-fetchcontent-deps.cdx.json
        run: |
          check-jsonschema \
            --builtin-schema vendor.cyclonedx \
            .github/cpp-fetchcontent-deps.cdx.json

  port-smoke-test:
    name: port-smoke-test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Restore Conan cache
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-debug-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-debug-
            conan-${{ runner.os }}-

      - name: Restore FetchContent cache
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-${{ runner.os }}-gcc-debug-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-gcc-debug-
            fetchcontent-${{ runner.os }}-gcc-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          pip install conan
          conan profile detect --force

      - name: Build server binary
        run: |
          conan install . --build=missing -s build_type=Debug --output-folder build/debug
          cmake --preset debug
          cmake --build --preset debug --target ProjectAgamemnon_server

      - name: Negative PORT parsing smoke test
        env:
          AGAMEMNON_API_KEY: ${{ secrets.AGAMEMNON_API_KEY }}
        run: |
          SERVER=./build/debug/ProjectAgamemnon_server
          # PORT=abc must warn and fall back to 8080
          output=$(PORT=abc timeout 2s "$SERVER" 2>&1 || true)
          if echo "$output" | grep -qi "invalid\|warn\|8080\|fallback"; then
            echo "PORT=abc: warning emitted as expected"
          else
            echo "PORT=abc: expected warning not found in output:"
            echo "$output"
            exit 1
          fi
          # PORT=99999 must warn and fall back to 8080
          output=$(PORT=99999 timeout 2s "$SERVER" 2>&1 || true)
          if echo "$output" | grep -qi "invalid\|warn\|8080\|fallback\|out.*range\|range"; then
            echo "PORT=99999: warning emitted as expected"
          else
            echo "PORT=99999: expected warning not found in output:"
            echo "$output"
            exit 1
          fi

  docs:
    name: docs-validate
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Validate OpenAPI spec
        run: just docs-validate


>>>>>>> 5c14d3c (ci(docs): add docs-validate job for openapi spec changes (#143))
  check-all:
    name: All Build/Test Checks
    runs-on: ubuntu-24.04
    needs: [build-test, asan, python-orchestration, docker-build, cyclonedx-validate, port-smoke-test, docs]
    if: always()
    steps:
      - name: Check all jobs passed
        env:
          BUILD_TEST_RESULT: ${{ needs.build-test.result }}
          ASAN_RESULT: ${{ needs.asan.result }}
          PYTHON_ORCHESTRATION_RESULT: ${{ needs.python-orchestration.result }}
          DOCS_RESULT: ${{ needs.docs.result }}
          DOCKER_BUILD_RESULT: ${{ needs.docker-build.result }}
          CYCLONEDX_RESULT: ${{ needs.cyclonedx-validate.result }}
          PORT_SMOKE_RESULT: ${{ needs.port-smoke-test.result }}
        run: |
          if [ "$BUILD_TEST_RESULT" != "success" ]; then
            echo "build-test failed"
            exit 1
          fi
          if [ "$ASAN_RESULT" != "success" ]; then
            echo "asan failed"
            exit 1
          fi
          if [ "$PYTHON_ORCHESTRATION_RESULT" != "success" ]; then
            echo "python-orchestration failed"
            exit 1
          fi
          if [ "$DOCS_RESULT" != "success" ] && [ "$DOCS_RESULT" != "skipped" ]; then
            echo "docs-validate failed"
            exit 1
          fi
          if [ "$DOCKER_BUILD_RESULT" != "success" ]; then
            echo "docker-build failed"
            exit 1
          fi
          if [ "$CYCLONEDX_RESULT" != "success" ]; then
            echo "cyclonedx-validate failed"
            exit 1
          fi
          if [ "$PORT_SMOKE_RESULT" != "success" ]; then
            echo "port-smoke-test failed"
            exit 1
          fi
          echo "All checks passed"
