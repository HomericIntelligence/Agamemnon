name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: ${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        compiler: [gcc, clang]
        build_type: [debug, release]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Restore Conan cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ matrix.build_type }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-${{ matrix.build_type }}-
            conan-${{ runner.os }}-

      - name: Restore FetchContent cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: build/**/_deps
          key: fetchcontent-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-
            fetchcontent-${{ runner.os }}-${{ matrix.compiler }}-
            fetchcontent-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            sudo apt-get install -y clang
          fi
          pip install conan
          conan profile detect --force

      - name: Install Conan dependencies
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          BUILD_TYPE_CAP="${BUILD_TYPE^}"
          conan install . --build=missing -s build_type="$BUILD_TYPE_CAP" \
            --output-folder "build/$BUILD_TYPE"

      - name: Configure (${{ matrix.compiler }}, ${{ matrix.build_type }})
        env:
          COMPILER: ${{ matrix.compiler }}
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          if [ "$COMPILER" = "clang" ]; then
            export CC=clang CXX=clang++
          fi
          cmake --preset "$BUILD_TYPE"

      - name: Build
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: cmake --build --preset "$BUILD_TYPE"

      - name: Test
        env:
          BUILD_TYPE: ${{ matrix.build_type }}
        run: ctest --preset "$BUILD_TYPE" --timeout 120 --parallel 4

  # AddressSanitizer job -- catches dangling-reference / use-after-free regressions
  # introduced by incorrect lambda captures in routes.cpp (see #220).
  asan:
    name: ubuntu-24.04-clang-asan
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Restore Conan cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-asan-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-asan-
            conan-${{ runner.os }}-

      - name: Restore FetchContent cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: build/_deps
          key: fetchcontent-${{ runner.os }}-clang-asan-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-clang-asan-
            fetchcontent-${{ runner.os }}-clang-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang
          pip install conan
          conan profile detect --force

      - name: Install Conan dependencies
        run: |
          conan install . --build=missing -s build_type=Debug \
            --output-folder build/asan

      - name: Configure (clang, asan)
        run: |
          export CC=clang CXX=clang++
          cmake --preset asan

      - name: Build
        run: cmake --build --preset asan

      - name: Test
        env:
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=1
        run: ctest --preset asan --timeout 120 --parallel 4

  python-orchestration:
    name: python-orchestration
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11  # v0.9.6
        with:
          pixi-version: v0.70.2
          cache: true

      - name: Lint agamemnon/
        run: cd agamemnon && pixi run lint

      - name: Type check agamemnon/
        run: cd agamemnon && pixi run typecheck

      - name: Test agamemnon/
        run: cd agamemnon && pixi run test

  schema-validation:
    name: schema-validation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install check-jsonschema
        run: pip install check-jsonschema

      - name: Validate GitHub Actions workflow files
        run: |
          check-jsonschema \
            --builtin-schema vendor.github-workflows \
            .github/workflows/*.yml

      - name: Validate CMakePresets.json
        run: |
          check-jsonschema \
            --schemafile https://raw.githubusercontent.com/Kitware/CMake/master/Help/manual/presets/schema.json \
            CMakePresets.json

      - name: Validate .markdownlint.yaml
        run: |
          check-jsonschema \
            --schemafile https://raw.githubusercontent.com/DavidAnson/markdownlint/main/schema/markdownlint-config-schema.json \
            .markdownlint.yaml

  cyclonedx-validate:
    name: cyclonedx-validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install check-jsonschema
        run: pip install check-jsonschema

      - name: Validate cpp-fetchcontent-deps.cdx.json
        run: |
          check-jsonschema \
            --schemafile https://raw.githubusercontent.com/CycloneDX/specification/refs/heads/master/schema/bom-1.4.schema.json \
            .github/cpp-fetchcontent-deps.cdx.json

  port-smoke-test:
    name: port-smoke-test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Restore Conan cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-debug-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-debug-
            conan-${{ runner.os }}-

      - name: Restore FetchContent cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: build/_deps
          key: fetchcontent-${{ runner.os }}-gcc-debug-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-gcc-debug-
            fetchcontent-${{ runner.os }}-gcc-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          pip install conan
          conan profile detect --force

      - name: Build server binary
        run: |
          conan install . --build=missing -s build_type=Debug --output-folder build/debug
          cmake --preset debug
          cmake --build --preset debug --target Agamemnon_server

      - name: Negative PORT parsing smoke test
        env:
          AGAMEMNON_API_KEY: ${{ secrets.AGAMEMNON_API_KEY }}
        run: |
          SERVER=./build/debug/Agamemnon_server
          # PORT=abc must warn and fall back to 8080
          output=$(PORT=abc timeout 2s "$SERVER" 2>&1 || true)
          if echo "$output" | grep -qi "invalid\|warn\|8080\|fallback"; then
            echo "PORT=abc: warning emitted as expected"
          else
            echo "PORT=abc: expected warning not found in output:"
            echo "$output"
            exit 1
          fi
          # PORT=99999 must warn and fall back to 8080
          output=$(PORT=99999 timeout 2s "$SERVER" 2>&1 || true)
          if echo "$output" | grep -qi "invalid\|warn\|8080\|fallback\|out.*range\|range"; then
            echo "PORT=99999: warning emitted as expected"
          else
            echo "PORT=99999: expected warning not found in output:"
            echo "$output"
            exit 1
          fi

  peer-discovery-integration:
    name: peer-discovery-integration
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Restore Conan cache
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-debug-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-debug-
            conan-${{ runner.os }}-

      - name: Restore FetchContent cache
        uses: actions/cache@v4
        with:
          path: build/debug/_deps
          key: fetchcontent-${{ runner.os }}-gcc-debug-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-gcc-debug-
            fetchcontent-${{ runner.os }}-gcc-

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          pip install conan
          conan profile detect --force

      - name: Download nats-server tarball (pinned)
        env:
          NATS_VERSION: v2.10.20
        run: |
          curl -fsSL --retry 3 -o "/tmp/nats-server-${NATS_VERSION}-linux-amd64.tar.gz" \
            "https://github.com/nats-io/nats-server/releases/download/${NATS_VERSION}/nats-server-${NATS_VERSION}-linux-amd64.tar.gz"

      - name: Verify nats-server tarball SHA256
        env:
          NATS_VERSION: v2.10.20
        run: |
          # Fail loud and early if the downloaded bytes do not match the pinned
          # digest committed in the repo. The verification happens BEFORE
          # extraction and BEFORE the binary is ever executed.
          cd /tmp
          sha256sum -c "$GITHUB_WORKSPACE/.github/checksums/nats-server-${NATS_VERSION}-linux-amd64.tar.gz.sha256"

      - name: Install nats-server
        env:
          NATS_VERSION: v2.10.20
        run: |
          tar -xzf "/tmp/nats-server-${NATS_VERSION}-linux-amd64.tar.gz" -C /tmp
          sudo install -m 0755 \
            "/tmp/nats-server-${NATS_VERSION}-linux-amd64/nats-server" \
            /usr/local/bin/nats-server
          nats-server --version
          # Sanity-check the CLI flag the fixture depends on.
          nats-server -h 2>&1 | grep -q '\-a'

      - name: Install Conan dependencies
        run: |
          conan install . --build=missing -s build_type=Debug \
            --output-folder build/debug

      - name: Configure
        run: cmake --preset debug

      - name: Build integration tests
        run: cmake --build --preset debug --target Agamemnon_integration_tests

      - name: Run peer-discovery integration tests
        env:
          AGAMEMNON_PEER_DISCOVERY_INTEGRATION: required
        working-directory: build/debug
        run: ctest -L integration -R PeerDiscovery --output-on-failure --timeout 60

  docs:
    name: docs-validate
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install just
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6  # v2.0.0
        with:
          just-version: "1.36.0"

      - name: Validate OpenAPI spec
        run: just docs-validate

  check-all:
    name: All Build/Test Checks
    runs-on: ubuntu-24.04
    needs: [build-test, asan, python-orchestration, schema-validation, cyclonedx-validate, port-smoke-test, peer-discovery-integration, docs]
    if: always()
    steps:
      - name: Check all jobs passed
        env:
          BUILD_TEST_RESULT: ${{ needs.build-test.result }}
          ASAN_RESULT: ${{ needs.asan.result }}
          PYTHON_ORCHESTRATION_RESULT: ${{ needs.python-orchestration.result }}
          DOCS_RESULT: ${{ needs.docs.result }}
          SCHEMA_VALIDATION_RESULT: ${{ needs.schema-validation.result }}
          CYCLONEDX_RESULT: ${{ needs.cyclonedx-validate.result }}
          PORT_SMOKE_RESULT: ${{ needs.port-smoke-test.result }}
          PEER_DISCOVERY_INTEGRATION_RESULT: ${{ needs.peer-discovery-integration.result }}
        run: |
          if [ "$BUILD_TEST_RESULT" != "success" ]; then
            echo "build-test failed"
            exit 1
          fi
          if [ "$ASAN_RESULT" != "success" ]; then
            echo "asan failed"
            exit 1
          fi
          if [ "$PYTHON_ORCHESTRATION_RESULT" != "success" ]; then
            echo "python-orchestration failed"
            exit 1
          fi
          if [ "$DOCS_RESULT" != "success" ] && [ "$DOCS_RESULT" != "skipped" ]; then
            echo "docs-validate failed"
            exit 1
          fi
          if [ "$SCHEMA_VALIDATION_RESULT" != "success" ]; then
            echo "schema-validation failed"
            exit 1
          fi
          if [ "$CYCLONEDX_RESULT" != "success" ]; then
            echo "cyclonedx-validate failed"
            exit 1
          fi
          if [ "$PORT_SMOKE_RESULT" != "success" ]; then
            echo "port-smoke-test failed"
            exit 1
          fi
          if [ "$PEER_DISCOVERY_INTEGRATION_RESULT" != "success" ]; then
            echo "peer-discovery-integration failed"
            exit 1
          fi
          echo "All checks passed"
