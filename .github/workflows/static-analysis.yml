name: Static Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Install clang-format
        run: sudo apt-get install -y clang-format
      - name: Check formatting
        run: ./scripts/format.sh --check

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Restore Conan cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-debug-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-debug-
            conan-${{ runner.os }}-

      - name: Restore FetchContent cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: build/**/_deps
          key: fetchcontent-${{ runner.os }}-clang-debug-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-clang-debug-
            fetchcontent-${{ runner.os }}-clang-
            fetchcontent-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get install -y ninja-build clang clang-tidy
          pip install conan
          conan profile detect --force
      - name: Install Conan dependencies
        run: |
          conan install . --build=missing -s build_type=Debug \
            --output-folder build/debug
      - name: Configure
        run: cmake --preset debug -DProjectAgamemnon_ENABLE_CLANG_TIDY=ON
      - name: Build (triggers clang-tidy)
        run: cmake --build --preset debug

  check-all:
    name: All Static Analysis Checks
    runs-on: ubuntu-24.04
    needs: [clang-format, clang-tidy]
    if: always()
    steps:
      - name: Check all jobs passed
        env:
          CLANG_FORMAT_RESULT: ${{ needs.clang-format.result }}
          CLANG_TIDY_RESULT: ${{ needs.clang-tidy.result }}
        run: |
          if [ "$CLANG_FORMAT_RESULT" != "success" ] || \
             [ "$CLANG_TIDY_RESULT" != "success" ]; then
            echo "Static analysis failed"
            exit 1
          fi
          echo "All checks passed"
