name: Gitleaks Allowlist Audit

on:
  schedule:
    # Run on the 1st of every month at 06:00 UTC
    - cron: "0 6 1 * *"
  push:
    branches: [main]
    paths:
      - ".gitleaks.toml"
  workflow_dispatch: {}

jobs:
  audit:
    name: Gitleaks audit scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      # gitleaks-action v3 requires a paid GITLEAKS_LICENSE for org repos, so
      # this job invokes the gitleaks CLI directly — same pinned version +
      # checksum as the security/secrets-scan job in _required.yml; bump both
      # together.
      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          # SHA256 of gitleaks_${VERSION}_linux_x64.tar.gz from upstream checksums.txt
          GITLEAKS_SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/')
          TARBALL="gitleaks_${GITLEAKS_VERSION}_${OS}_${ARCH}.tar.gz"
          curl -sSfL -o "$TARBALL" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${TARBALL}"
          echo "${GITLEAKS_SHA256}  ${TARBALL}" | sha256sum --check
          tar -xz -C /usr/local/bin -f "$TARBALL" gitleaks
          rm -f "$TARBALL"
          gitleaks version

      - name: Gitleaks enforcement regression guard
        # Fails the build if a silent gitleaks invocation (exit-code zero) is
        # ever reintroduced into this workflow file. Mirrors the guard in
        # _required.yml; see HomericIntelligence/Agamemnon#266.
        # NOTE: matches only actual `gitleaks ... --exit-code 0` command
        # invocations, so the guard's own descriptive text does not self-match.
        run: |
          if grep -nE '^[[:space:]]*gitleaks[[:space:]].*--exit-code[[:space:]]+0([[:space:]]|$)' \
               .github/workflows/gitleaks-audit.yml; then
            echo "::error::silent gitleaks invocation detected; enforcement must remain strict"
            exit 1
          fi

      - name: Run gitleaks audit
        run: |
          gitleaks detect --source . --config .gitleaks.toml \
            --report-format json --report-path gitleaks-report.json --exit-code 1

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: gitleaks-report-${{ github.run_id }}
          path: gitleaks-report.json
          retention-days: 90
