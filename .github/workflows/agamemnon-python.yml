name: Agamemnon Python CI

on:
  push:
    branches: [main]
    paths:
      - "agamemnon/**"
      - ".github/workflows/agamemnon-python.yml"
  pull_request:
    branches: [main]
    paths:
      - "agamemnon/**"
      - ".github/workflows/agamemnon-python.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true

      - name: Sync (uv)
        working-directory: agamemnon
        run: uv sync --locked

      - name: Run ruff
        working-directory: agamemnon
        run: uv run ruff check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true

      - name: Sync (uv)
        working-directory: agamemnon
        run: uv sync --locked

      - name: Run mypy
        working-directory: agamemnon
        run: uv run mypy src/agamemnon/

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true

      - name: Sync (uv)
        working-directory: agamemnon
        run: uv sync --locked

      - name: Run tests
        working-directory: agamemnon
        run: uv run pytest tests/ -v
