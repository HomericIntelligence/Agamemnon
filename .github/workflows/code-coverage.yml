name: Code Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Restore Conan cache
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-debug-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-debug-
            conan-${{ runner.os }}-

      - name: Restore FetchContent cache
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-${{ runner.os }}-gcc-debug-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-gcc-debug-
            fetchcontent-${{ runner.os }}-gcc-
            fetchcontent-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get install -y ninja-build gcovr libgtest-dev libgmock-dev
          pip install conan
          conan profile detect --force
      - name: Install Conan dependencies
        run: |
          conan install . --build=missing -s build_type=Debug \
            --output-folder build/coverage
      - name: Configure
        run: cmake --preset coverage
      - name: Build
        run: cmake --build --preset coverage
      - name: Test
        run: ctest --preset coverage
      - name: Generate coverage report
        run: ./scripts/coverage.sh
      - name: Check threshold
        run: |
          LINE_COV=$(python3 -c "import xml.etree.ElementTree as ET; root = ET.parse('build/coverage-report/coverage.xml').getroot(); print(f\"{float(root.attrib.get('line-rate', 0)) * 100:.1f}\")")
          echo "Line coverage: ${LINE_COV}%"
          python3 -c "import sys; cov=float('${LINE_COV}'); sys.exit(0 if cov >= 80 else 1)"

  check-all:
    name: All Coverage Checks
    runs-on: ubuntu-24.04
    needs: [coverage]
    if: always()
    steps:
      - name: Check all jobs passed
        env:
          COVERAGE_RESULT: ${{ needs.coverage.result }}
        run: |
          if [ "$COVERAGE_RESULT" != "success" ]; then
            echo "Coverage check failed"
            exit 1
          fi
          echo "All checks passed"
