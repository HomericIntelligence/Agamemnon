name: Code Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage:
    name: Coverage
    runs-on: [self-hosted, self-hosted-aeolus]
    container:
      image: ubuntu:24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Bootstrap container toolchain
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            sudo build-essential cmake git curl ca-certificates \
            python3 python3-pip python3-venv pkg-config
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Restore Conan cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-debug-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-debug-
            conan-${{ runner.os }}-

      - name: Restore FetchContent cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: build/**/_deps
          key: fetchcontent-r2-${{ runner.os }}-gcc-debug-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake') }}
          restore-keys: |
            fetchcontent-r2-${{ runner.os }}-gcc-debug-
            fetchcontent-r2-${{ runner.os }}-gcc-
            fetchcontent-r2-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build gcovr libgtest-dev libgmock-dev
          pip install --user conan
          conan profile detect --force
      - name: Install Conan dependencies
        run: |
          conan install . --build=missing -s build_type=Debug \
            --output-folder build/coverage
      - name: Configure
        run: cmake --preset coverage
      - name: Build
        run: cmake --build --preset coverage
      - name: Test
        run: ctest --preset coverage
      - name: Generate coverage report
        run: ./scripts/coverage.sh
      - name: Check threshold
        run: |
          # TODO: Raise threshold back to 80% once additional C++ tests land.
          # Current actual line coverage is ~77.2% (run 25640957315, 2026-05-10).
          # Target: 80% line coverage. Tracking ratchet upward as tests are added.
          LINE_COV=$(python3 -c "import xml.etree.ElementTree as ET; root = ET.parse('build/coverage-report/coverage.xml').getroot(); print(f\"{float(root.attrib.get('line-rate', 0)) * 100:.1f}\")")
          echo "Line coverage: ${LINE_COV}%"
          python3 -c "import sys; cov=float('${LINE_COV}'); sys.exit(0 if cov >= 75 else 1)"

  check-all:
    name: All Coverage Checks
    runs-on: ubuntu-24.04
    needs: [coverage]
    if: always()
    steps:
      - name: Check all jobs passed
        env:
          COVERAGE_RESULT: ${{ needs.coverage.result }}
        run: |
          if [ "$COVERAGE_RESULT" != "success" ]; then
            echo "Coverage check failed"
            exit 1
          fi
          echo "All checks passed"
