name: Python Client CI

# NOTE: This workflow is pure Python today (no C++ build steps). If a future change
# adds `conan install`, `cmake --preset`, or `FetchContent` (e.g. for a C++ extension
# in the Python client), wire in the Conan + FetchContent caches the same way
# `_required.yml` (build-test job) does — see issue #242.

on:
  push:
    branches: [main]
    paths:
      - "clients/python/**"
      - ".github/workflows/python-client.yml"
  pull_request:
    branches: [main]
    paths:
      - "clients/python/**"
      - ".github/workflows/python-client.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11  # v0.9.6
        with:
          pixi-version: v0.70.2
          manifest-path: clients/python/pixi.toml
          cache: true

      - name: Run ruff
        run: pixi run --manifest-path clients/python/pixi.toml lint

      - name: Track deprecated KEYSTONE_* env var names
        run: |
          # Bucket D: capture once into a variable so the no-match exit code
          # from grep does not poison the run under set -e/pipefail. `grep`
          # without -q exits 0 (match), 1 (no match), or >1 (error); we treat
          # 0/1 as "ran successfully" and surface anything else.
          set +e
          set -uo pipefail
          raw=$(grep -rn --include="*.py" \
            "KEYSTONE_LOG_LEVEL\|KEYSTONE_POLL_INTERVAL\|KEYSTONE_SHUTDOWN_TIMEOUT" \
            clients/python/src)
          rc=$?
          if [ "$rc" -gt 1 ]; then
            echo "::error::grep failed with exit code $rc"
            exit "$rc"
          fi
          # Filter out comment-only lines.
          filtered=$(printf '%s\n' "$raw" | grep -v '^\s*#')
          frc=$?
          if [ "$frc" -gt 1 ]; then
            echo "::error::grep -v failed with exit code $frc"
            exit "$frc"
          fi
          set -e
          if [ -n "$filtered" ]; then
            count=$(printf '%s\n' "$filtered" | wc -l)
            echo "::warning::Found $count reference(s) to deprecated KEYSTONE_* env vars in src/ - should be 0 before shim removal"
            printf '%s\n' "$filtered"
          else
            echo "PASSED: No deprecated KEYSTONE_* references found in src/"
          fi

  typecheck:
    name: Type Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11  # v0.9.6
        with:
          pixi-version: v0.70.2
          manifest-path: clients/python/pixi.toml
          cache: true

      - name: Run mypy
        run: pixi run --manifest-path clients/python/pixi.toml typecheck

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11  # v0.9.6
        with:
          pixi-version: v0.70.2
          manifest-path: clients/python/pixi.toml
          cache: true

      - name: Run tests
        run: pixi run --manifest-path clients/python/pixi.toml test

      - name: Run script coverage (bump-version)
        run: pixi run --manifest-path clients/python/pixi.toml coverage-scripts
