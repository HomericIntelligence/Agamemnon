name: Python Client CI

on:
  push:
    branches: [main]
    paths:
      - "clients/python/**"
      - ".github/workflows/python-client.yml"
  pull_request:
    branches: [main]
    paths:
      - "clients/python/**"
      - ".github/workflows/python-client.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            clients/python/.pixi
            ~/.cache/rattler/cache
          key: pixi-${{ runner.os }}-${{ hashFiles('clients/python/pixi.lock') }}
          restore-keys: pixi-${{ runner.os }}-

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.39.5
          manifest-path: clients/python/pixi.toml

      - name: Run ruff
        run: pixi run --manifest-path clients/python/pixi.toml lint

      - name: Track deprecated KEYSTONE_* env var names
        run: |
          count=$(grep -rn --include="*.py" \
            "KEYSTONE_LOG_LEVEL\|KEYSTONE_POLL_INTERVAL\|KEYSTONE_SHUTDOWN_TIMEOUT" \
            clients/python/src \
            | grep -v '^\s*#' \
            | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "::warning::Found $count reference(s) to deprecated KEYSTONE_* env vars in src/ - should be 0 before shim removal"
            grep -rn --include="*.py" \
              "KEYSTONE_LOG_LEVEL\|KEYSTONE_POLL_INTERVAL\|KEYSTONE_SHUTDOWN_TIMEOUT" \
              clients/python/src \
              | grep -v '^\s*#' || true
          else
            echo "PASSED: No deprecated KEYSTONE_* references found in src/"
          fi

  typecheck:
    name: Type Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            clients/python/.pixi
            ~/.cache/rattler/cache
          key: pixi-${{ runner.os }}-${{ hashFiles('clients/python/pixi.lock') }}
          restore-keys: pixi-${{ runner.os }}-

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.39.5
          manifest-path: clients/python/pixi.toml

      - name: Run mypy
        run: pixi run --manifest-path clients/python/pixi.toml typecheck

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            clients/python/.pixi
            ~/.cache/rattler/cache
          key: pixi-${{ runner.os }}-${{ hashFiles('clients/python/pixi.lock') }}
          restore-keys: pixi-${{ runner.os }}-

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.39.5
          manifest-path: clients/python/pixi.toml

      - name: Run tests
        run: pixi run --manifest-path clients/python/pixi.toml test
