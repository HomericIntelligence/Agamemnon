name: Required Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: required-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. lint ────────────────────────────────────────────────────────────────
  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: C++ format check
        run: ./scripts/format.sh --check

      - name: Install ruff
        run: pip install ruff

      - name: Python client lint
        run: ruff check clients/python/

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang clang-tidy
          pip install conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Install Conan dependencies (debug, for compile_commands.json)
        run: |
          conan install . --build=missing -s build_type=Debug \
            --output-folder build/debug

      - name: Configure with clang-tidy enabled
        run: cmake --preset debug -DProjectAgamemnon_ENABLE_CLANG_TIDY=ON

      - name: Build (runs clang-tidy)
        run: cmake --build --preset debug

      - name: Install mypy
        run: pip install mypy

      - name: Python client type check
        continue-on-error: true
        run: mypy clients/python/ --ignore-missing-imports

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@05f32210e84442804257b2a6f20b273450ec8265  # v20.0.0
        with:
          globs: "**/*.md"
          config: ".markdownlint.yaml"

  pixi-check:
    name: pixi-check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Skip if no pixi.toml
        id: detect
        run: |
          if [ ! -f pixi.toml ]; then
            echo "::notice::No pixi.toml in repo, skipping pixi-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Cache pixi environment
        if: steps.detect.outputs.skip == 'false'
        uses: actions/cache@v5
        with:
          path: |
            .pixi
            ~/.cache/rattler/cache
          key: pixi-${{ runner.os }}-${{ hashFiles('pixi.lock') }}
      - name: Setup pixi
        if: steps.detect.outputs.skip == 'false'
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.67.2
          cache: false
      - name: pixi install (locked)
        if: steps.detect.outputs.skip == 'false'
        run: |
          if [ ! -f pixi.lock ]; then
            echo "::error::pixi.lock is missing — commit it by running: pixi lock"
            exit 1
          fi
          pixi install --locked

  justfile-check:
    name: justfile-check
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Skip if no justfile
        id: detect
        run: |
          if [ ! -f justfile ] && [ ! -f Justfile ]; then
            echo "::notice::No justfile in repo, skipping justfile-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install just
        if: steps.detect.outputs.skip == 'false'
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6  # v2.0.0
        with:
          just-version: "1.36.0"
      - name: Validate justfile
        if: steps.detect.outputs.skip == 'false'
        run: |
          just --evaluate >/dev/null
          just --list >/dev/null

  symlink-check:
    name: symlink-check
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run symlink check
        run: bash scripts/check-symlinks.sh

  # ── 2. unit-tests ──────────────────────────────────────────────────────────
  unit-tests:
    name: unit-tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          pip install conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Install Conan dependencies
        run: |
          conan install . --build=missing -s build_type=Release \
            --output-folder build/release

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Run unit tests
        run: ctest --preset release --output-on-failure

  # ── 3. integration-tests ───────────────────────────────────────────────────
  integration-tests:
    name: integration-tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          pip install conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Install Conan dependencies
        run: |
          conan install . --build=missing -s build_type=Release \
            --output-folder build/release

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Run integration tests (label filter, fallback to full suite)
        run: |
          cd build/release
          if ctest -L integration --output-on-failure --dry-run 2>&1 | grep -q "No tests were found"; then
            echo "No 'integration' label found — running full test suite"
            ctest --output-on-failure
          else
            ctest -L integration --output-on-failure
          fi

  # ── 4. security/dependency-scan ────────────────────────────────────────────
  security-dependency-scan:
    name: security/dependency-scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Python client dependency audit
        run: |
          pip install -r clients/python/pyproject.toml 2>/dev/null || true
          cd clients/python
          pip-audit --require-hashes 2>/dev/null || pip-audit || true

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Trivy filesystem scan
        run: trivy fs --exit-code 1 --severity HIGH,CRITICAL --scanners vuln .

  # ── 5. security/secrets-scan ───────────────────────────────────────────────
  security-secrets-scan:
    name: security/secrets-scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/')
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_${OS}_${ARCH}.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run Gitleaks
        run: |
          if [ -f .gitleaks.toml ]; then
            gitleaks detect --source . --config .gitleaks.toml \
              --report-format sarif --report-path gitleaks.sarif --exit-code 0
          else
            gitleaks detect --source . \
              --report-format sarif --report-path gitleaks.sarif --exit-code 0
          fi
        continue-on-error: true

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          retention-days: 90

  # ── 6. build ───────────────────────────────────────────────────────────────
  build:
    name: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          pip install conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Install Conan dependencies (release)
        run: |
          conan install . --build=missing -s build_type=Release \
            --output-folder build/release

      - name: Configure (release, warnings-as-errors)
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

  # ── 7. schema-validation ───────────────────────────────────────────────────
  schema-validation:
    name: schema-validation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install check-jsonschema
        run: pip install check-jsonschema

      - name: Validate GitHub Actions workflow schemas
        run: |
          find .github/workflows -name "*.yml" | \
            xargs check-jsonschema \
              --schemafile https://json.schemastore.org/github-workflow

  # ── 8. deps/version-sync ───────────────────────────────────────────────────
  deps-version-sync:
    name: deps/version-sync
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check CMakeLists.txt vs conanfile.py version consistency
        run: |
          python3 - <<'EOF'
          import re, sys

          cmake_text = open("CMakeLists.txt").read()
          cmake_match = re.search(r"project\s*\([^)]*VERSION\s+(\S+)", cmake_text)
          if not cmake_match:
              print("ERROR: could not find VERSION in CMakeLists.txt", file=sys.stderr)
              sys.exit(1)
          cmake_ver = cmake_match.group(1)
          print(f"CMake version:  {cmake_ver}")

          conan_text = open("conanfile.py").read()
          conan_match = re.search(r'version\s*=\s*["\']([^"\']+)["\']', conan_text)
          if not conan_match:
              print("ERROR: could not find version in conanfile.py", file=sys.stderr)
              sys.exit(1)
          conan_ver = conan_match.group(1)
          print(f"Conan version:  {conan_ver}")

          if cmake_ver != conan_ver:
              print(f"ERROR: version mismatch — CMakeLists.txt={cmake_ver}, conanfile.py={conan_ver}", file=sys.stderr)
              sys.exit(1)

          print("OK: versions match")
          EOF
