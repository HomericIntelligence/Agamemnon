name: Required Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: required-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. lint ────────────────────────────────────────────────────────────────
  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Restore Conan cache
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-debug-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-debug-
            conan-${{ runner.os }}-

      - name: Restore FetchContent cache
        uses: actions/cache@v4
        with:
          path: build/**/_deps
          key: fetchcontent-${{ runner.os }}-clang-debug-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-clang-debug-
            fetchcontent-${{ runner.os }}-clang-
            fetchcontent-${{ runner.os }}-

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: C++ format check
        run: ./scripts/format.sh --check

      - name: Install ruff
        run: pip install ruff

      - name: Python client lint
        run: ruff check clients/python/

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang clang-tidy
          pip install conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Install Conan dependencies (debug, for compile_commands.json)
        run: |
          conan install . --build=missing -s build_type=Debug \
            --output-folder build/debug

      - name: Configure with clang-tidy enabled
        run: cmake --preset debug -DProjectAgamemnon_ENABLE_CLANG_TIDY=ON

      - name: Build (runs clang-tidy)
        run: cmake --build --preset debug

      - name: Install mypy
        run: pip install mypy

      - name: Enforce Python client type check
        run: mypy clients/python/

      - name: Check GitHub Actions workflow schemas
        run: actionlint

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@05f32210e84442804257b2a6f20b273450ec8265  # v20.0.0
        with:
          globs: "**/*.md"
          config: ".markdownlint.yaml"

  pixi-check:
    name: pixi-check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Skip if no pixi.toml
        id: detect
        run: |
          if [ ! -f pixi.toml ]; then
            echo "::notice::No pixi.toml in repo, skipping pixi-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Assert pixi.lock is committed
        if: steps.detect.outputs.skip == 'false'
        run: |
          if [ ! -f pixi.lock ]; then
            echo "::error::pixi.lock is missing. Run 'pixi install' locally and commit pixi.lock."
            exit 1
          fi
      - name: Restore pixi cache
        if: steps.detect.outputs.skip == 'false'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            .pixi
            ~/.cache/rattler/cache
          key: pixi-${{ runner.os }}-${{ hashFiles('pixi.lock') }}
          restore-keys: pixi-${{ runner.os }}-
      - name: Setup pixi
        if: steps.detect.outputs.skip == 'false'
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.67.2
          cache: false
      - name: pixi install --locked
        if: steps.detect.outputs.skip == 'false'
        run: pixi install --locked

  justfile-check:
    name: justfile-check
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Skip if no justfile
        id: detect
        run: |
          if [ ! -f justfile ] && [ ! -f Justfile ]; then
            echo "::notice::No justfile in repo, skipping justfile-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install just
        if: steps.detect.outputs.skip == 'false'
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6  # v2.0.0
        with:
          just-version: "1.36.0"
      - name: Validate justfile
        if: steps.detect.outputs.skip == 'false'
        run: |
          just --evaluate >/dev/null
          just --list >/dev/null

  symlink-check:
    name: symlink-check
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run symlink check
        run: bash scripts/check-symlinks.sh

  forbid-suppressions:
    name: forbid-suppressions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: "Reject silent-failure workaround in shell/YAML/Dockerfile/justfile/HCL"
        run: |
          # Scans ProjectAgamemnon sources. Matches the forbidden idiom at end
          # of line or before a trailing comment. See
          # HomericIntelligence/Odysseus#280.
          set -euo pipefail
          mapfile -t files < <(git ls-files \
            -- \
            '*.sh' '*.bash' '*.yml' '*.yaml' '*.hcl' \
            'Dockerfile*' '**/Dockerfile*' \
            'justfile' '**/justfile' 'Justfile' '**/Justfile')
          # Skip this workflow file itself (heredoc would otherwise self-match).
          declare -a scan_files=()
          for f in "${files[@]}"; do
            case "$f" in
              .github/workflows/_required.yml) continue ;;
            esac
            scan_files+=("$f")
          done
          if [ "${#scan_files[@]}" -eq 0 ]; then
            echo "No files to scan"
            exit 0
          fi
          if grep -nE '\|\|[[:space:]]*true([[:space:]]*$|[[:space:]]+#)' "${scan_files[@]}"; then
            echo ""
            echo '::error::Found silent-failure workarounds above. Refactor per HomericIntelligence/Odysseus#280.'
            exit 1
          fi
          echo 'OK: no silent-failure workarounds found'

      - name: "Reject continue-on-error workflow opt-out"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files -- '.github/workflows/*.yml' '.github/workflows/*.yaml')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No workflow files"
            exit 0
          fi
          if grep -nE '^[[:space:]]*continue-on-error:[[:space:]]*true[[:space:]]*$' "${files[@]}"; then
            echo ""
            echo '::error::Found continue-on-error true above; fix root cause.'
            echo '::error::See HomericIntelligence/Odysseus#280.'
            exit 1
          fi
          echo 'OK: no "continue-on-error: true" found'

  # ── 2. unit-tests ──────────────────────────────────────────────────────────
  unit-tests:
    name: unit-tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Restore Conan cache
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-release-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-release-
            conan-${{ runner.os }}-

      - name: Restore FetchContent cache
        uses: actions/cache@v4
        with:
          path: build/**/_deps
          key: fetchcontent-${{ runner.os }}-gcc-release-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-gcc-release-
            fetchcontent-${{ runner.os }}-gcc-
            fetchcontent-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          pip install conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Install Conan dependencies
        run: |
          conan install . --build=missing -s build_type=Release \
            --output-folder build/release

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Run unit tests
        run: ctest --preset release --output-on-failure --timeout 120

  # ── 3. integration-tests ───────────────────────────────────────────────────
  integration-tests:
    name: integration-tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Restore Conan cache
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-release-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-release-
            conan-${{ runner.os }}-

      - name: Restore FetchContent cache
        uses: actions/cache@v4
        with:
          path: build/**/_deps
          key: fetchcontent-${{ runner.os }}-gcc-release-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-gcc-release-
            fetchcontent-${{ runner.os }}-gcc-
            fetchcontent-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          pip install conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Install Conan dependencies
        run: |
          conan install . --build=missing -s build_type=Release \
            --output-folder build/release

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Run integration tests (label filter, fallback to full suite)
        run: |
          cd build/release
          if ctest -L integration --output-on-failure --dry-run 2>&1 | grep -q "No tests were found"; then
            echo "No 'integration' label found — running full test suite"
            ctest --output-on-failure
          else
            ctest -L integration --output-on-failure
          fi

  # ── 4. security/dependency-scan ────────────────────────────────────────────
  security-dependency-scan:
    name: security/dependency-scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            clients/python/.pixi
            ~/.cache/rattler/cache
          key: pixi-lint-${{ runner.os }}-${{ hashFiles('clients/python/pixi.lock') }}
          restore-keys: pixi-lint-${{ runner.os }}-

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.39.5
          manifest-path: clients/python/pixi.toml

      - name: Python client dependency audit
        run: pixi run --manifest-path clients/python/pixi.toml --environment lint audit

      - name: Install Trivy
        run: |
          # v0.58.1 has been removed from upstream releases (404 from the
          # binary URL and from the install.sh tag lookup, which is why CI
          # was failing). Bump to v0.69.3 — current at time of fix — and use
          # a direct binary download to keep the install deterministic.
          TRIVY_VERSION=0.69.3
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o /tmp/trivy.tar.gz
          tar -xz -C /usr/local/bin -f /tmp/trivy.tar.gz trivy
          trivy --version

      - name: Trivy filesystem scan
        run: trivy fs --exit-code 1 --severity HIGH,CRITICAL --scanners vuln .

      - name: Install Conan
        run: pip install conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Generate Conan lock file
        run: conan lock create conanfile.py --lockfile-out=conan.lock --build=missing

      - name: Install Syft
        run: |
          SYFT_VERSION=1.4.1
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin "v${SYFT_VERSION}"
          syft version

      - name: Install Grype
        run: |
          GRYPE_VERSION=0.87.0
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin "v${GRYPE_VERSION}"
          grype version

      - name: Generate SBOM from Conan lock
        run: syft . --override-default-catalogers conan -o cyclonedx-json=conan-sbom.cdx.json

      - name: Scan Conan SBOM for CVEs
        run: grype sbom:conan-sbom.cdx.json --fail-on high --output table

      - name: Scan FetchContent deps (nats.c) for CVEs
        run: grype sbom:.github/cpp-fetchcontent-deps.cdx.json --fail-on high --output table

      - name: Upload C++ SBOMs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-sbom
          path: |
            conan-sbom.cdx.json
            .github/cpp-fetchcontent-deps.cdx.json
          retention-days: 90

  # ── 5. security/secrets-scan ───────────────────────────────────────────────
  security-secrets-scan:
    name: security/secrets-scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          # SHA256 of gitleaks_${VERSION}_linux_x64.tar.gz from upstream checksums.txt
          GITLEAKS_SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/')
          TARBALL="gitleaks_${GITLEAKS_VERSION}_${OS}_${ARCH}.tar.gz"
          curl -sSfL -o "$TARBALL" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${TARBALL}"
          echo "${GITLEAKS_SHA256}  ${TARBALL}" | sha256sum --check
          tar -xz -C /usr/local/bin -f "$TARBALL" gitleaks
          rm -f "$TARBALL"
          gitleaks version

      - name: Gitleaks enforcement regression guard
        # Fails the build if a silent gitleaks invocation (exit-code zero) is
        # ever reintroduced into this workflow file. See
        # HomericIntelligence/ProjectAgamemnon#266.
        # NOTE: matches only actual `gitleaks ... --exit-code 0` command
        # invocations, so the guard's own descriptive text does not self-match.
        run: |
          if grep -nE '^[[:space:]]*gitleaks[[:space:]].*--exit-code[[:space:]]+0([[:space:]]|$)' \
               .github/workflows/_required.yml; then
            echo "::error::silent gitleaks invocation detected; enforcement must remain strict"
            exit 1
          fi

      - name: Run Gitleaks
        run: |
          if [ -f .gitleaks.toml ]; then
            gitleaks detect --source . --config .gitleaks.toml \
              --report-format sarif --report-path gitleaks.sarif --exit-code 1
          else
            gitleaks detect --source . \
              --report-format sarif --report-path gitleaks.sarif --exit-code 1
          fi

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          retention-days: 90

  # ── 6. build ───────────────────────────────────────────────────────────────
  build:
    name: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Restore Conan cache
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-release-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-release-
            conan-${{ runner.os }}-

      - name: Restore FetchContent cache
        uses: actions/cache@v4
        with:
          path: build/**/_deps
          key: fetchcontent-${{ runner.os }}-gcc-release-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-gcc-release-
            fetchcontent-${{ runner.os }}-gcc-
            fetchcontent-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          pip install conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Install Conan dependencies (release)
        run: |
          conan install . --build=missing -s build_type=Release \
            --output-folder build/release

      - name: Configure (release, warnings-as-errors)
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

  # ── 7. schema-validation ───────────────────────────────────────────────────
  schema-validation:
    name: schema-validation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install check-jsonschema
        run: pip install check-jsonschema

      - name: Validate GitHub Actions workflow schemas
        run: |
          find .github/workflows -name "*.yml" | sort | \
            xargs check-jsonschema \
              --schemafile .github/schemas/github-workflow.json

  # ── 8. deps/version-sync ───────────────────────────────────────────────────
  deps-version-sync:
    name: deps/version-sync
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check CMakeLists.txt vs conanfile.py version consistency
        run: |
          python3 - <<'EOF'
          import re, sys

          cmake_text = open("CMakeLists.txt").read()
          cmake_match = re.search(r"project\s*\([^)]*VERSION\s+(\S+)", cmake_text)
          if not cmake_match:
              print("ERROR: could not find VERSION in CMakeLists.txt", file=sys.stderr)
              sys.exit(1)
          cmake_ver = cmake_match.group(1)
          print(f"CMake version:  {cmake_ver}")

          conan_text = open("conanfile.py").read()
          conan_match = re.search(r'version\s*=\s*["\']([^"\']+)["\']', conan_text)
          if not conan_match:
              print("ERROR: could not find version in conanfile.py", file=sys.stderr)
              sys.exit(1)
          conan_ver = conan_match.group(1)
          print(f"Conan version:  {conan_ver}")

          if cmake_ver != conan_ver:
              print(f"ERROR: version mismatch — CMakeLists.txt={cmake_ver}, conanfile.py={conan_ver}", file=sys.stderr)
              sys.exit(1)

          print("OK: versions match")
          EOF
